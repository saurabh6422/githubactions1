name: Java Application Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Job
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v6

      - name: Set up jdk 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin' 
          java-version: '17'

      - name: Build with maven
        run: mvn clean package
      
      - name: Run Tests
        run: mvn test
